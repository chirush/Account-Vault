<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Account Vault — Secure Password Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Client-side encrypted account vault using AES-256-GCM. No backend, no tracking." />
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Header -->
  <header>
    <div class="header-left">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <h1>Account Vault</h1>
    </div>
    <div class="header-right">
      <div id="vaultActions" class="hidden">
        <div style="display:flex;gap:6px;align-items:center">
          <button class="header-btn" onclick="saveVault()" title="Save Vault">
            <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
          <button class="header-btn" onclick="exportVault()" title="Export Vault">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <label class="header-btn" title="Import Vault">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <input type="file" accept=".json" onchange="importVault(event)" />
          </label>
          <button class="header-btn" onclick="showChangePassword()" title="Change Master Password">
            <svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          </button>
          <button class="header-btn" onclick="lockVault()" title="Lock Vault">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </button>
        </div>
      </div>
      <button class="header-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <svg id="iconSun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="iconMoon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="container">

    <!-- Lock Screen -->
    <div id="lockScreen" class="lock-screen">
      <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <h2>Welcome Back</h2>
        <p>Enter your master password to unlock the vault</p>
        <input id="master" type="password" placeholder="Master password" onkeydown="if(event.key==='Enter')unlock()" />
        <button class="btn-primary btn-full" onclick="unlock()" style="margin-top:12px">Unlock Vault</button>
        <div class="lock-import">
          <label>Import vault file<input type="file" accept=".json" onchange="importVault(event)" style="display:none" /></label>
        </div>
        <div class="lock-footer">
          <small>Client-Side Only &bull; AES-256-GCM &bull; No Backend</small>
        </div>
      </div>
    </div>

    <!-- Vault (hidden until unlock) -->
    <div id="vault" class="hidden">

      <!-- Dashboard -->
      <div class="dashboard">
        <div class="stat"><span class="stat-value" id="statCats">0</span><span class="stat-label">Categories</span></div>
        <div class="stat"><span class="stat-value" id="statAccs">0</span><span class="stat-label">Accounts</span></div>
        <div class="stat"><span class="stat-value" id="statSaved">–</span><span class="stat-label">Last Saved</span></div>
      </div>

      <!-- Categories -->
      <div class="card">
        <div class="card-header" onclick="toggle(this)">
          <h3>Categories</h3>
          <span class="toggle-arrow">▲</span>
        </div>
        <div class="card-body">
          <div id="categoryChips" class="category-chips"></div>
          <div class="add-cat-row">
            <input id="newCategory" placeholder="New category name" onkeydown="if(event.key==='Enter')addCategory()" />
            <button class="btn-primary" onclick="addCategory()">Add</button>
          </div>
        </div>
      </div>

      <!-- Account Form -->
      <div class="card">
        <div class="card-header" onclick="toggle(this)">
          <h3 id="catTitle">No category selected</h3>
          <span class="toggle-arrow">▲</span>
        </div>
        <div class="card-body">
          <input id="accName" placeholder="Account name" />

          <div class="input-wrap">
            <input id="accUser" placeholder="Username / Email" />
            <span class="icon-btn copy-btn" onclick="copyValue('accUser')" title="Copy username">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </span>
          </div>

          <div class="input-wrap">
            <input id="accPass" type="text" placeholder="Password / Token" />
            <span class="icon-btn toggle-btn" onclick="togglePassword()" title="Toggle visibility">
              <svg id="eyeShow" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeHide" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.82 21.82 0 0 1 5.06-6.06"/><path d="M1 1l22 22"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a21.82 21.82 0 0 1-4.1 5.17"/></svg>
            </span>
            <span class="icon-btn copy-btn" onclick="copyValue('accPass')" title="Copy password">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </span>
          </div>

          <textarea id="accNotes" placeholder="Notes" rows="3"></textarea>

          <div class="form-actions">
            <label class="favorite-toggle">
              <input type="checkbox" id="accFavorite" />
              <span class="star">★</span> Favorite
            </label>
            <div class="btn-group">
              <button class="btn-primary" onclick="saveAccount()">Save</button>
              <button class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Accounts List -->
      <div class="card">
        <div class="card-header" onclick="toggle(this)">
          <h3>Accounts</h3>
          <span class="toggle-arrow">▲</span>
        </div>
        <div class="card-body">
          <input id="search" placeholder="🔍  Search accounts..." oninput="renderAccounts()" />
          <div id="accountList"></div>
          <div id="pagination" class="pagination"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Change Password Modal -->
  <div id="cpModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeChangePassword()"></div>
    <div class="modal-content">
      <h3>Change Master Password</h3>
      <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:4px">Re-encrypts your vault with a new password</p>
      <input id="cpNew" type="password" placeholder="New password" />
      <input id="cpConfirm" type="password" placeholder="Confirm new password" />
      <div class="modal-actions">
        <button class="btn-primary" onclick="changePassword()">Change</button>
        <button class="btn-secondary" onclick="closeChangePassword()">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
